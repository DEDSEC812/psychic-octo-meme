<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDA NETWORK</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; }
  .container { max-width:800px; margin:20px auto; }
  .card { background:#fff; padding:15px; margin-bottom:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  input, textarea { width:100%; padding:10px; margin:5px 0; border-radius:5px; border:1px solid #ccc; }
  button { padding:10px 15px; margin:5px 0; border:none; border-radius:5px; cursor:pointer; }
  button.primary { background:#1877f2; color:#fff; }
  button.secondary { background:#42b72a; color:#fff; }
  .navbar { display:flex; justify-content:space-between; align-items:center; background:#1877f2; color:#fff; padding:10px 20px; }
  .navbar button { background:#fff; color:#1877f2; margin-left:5px; }
  .stories { display:flex; overflow-x:auto; padding:5px; }
  .story-card { min-width:100px; height:150px; background:#eee; margin-right:10px; display:flex; justify-content:center; align-items:center; border-radius:8px; cursor:pointer; }
  .feed .post { margin-bottom:15px; }
  .post-actions button { margin-right:5px; }
  img.profile-pic { width:40px; height:40px; border-radius:50%; margin-right:10px; vertical-align:middle; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar" style="display:none;">
  <div class="logo">TDA NETWORK</div>
  <div>
    <button onclick="showHome()">Home</button>
    <button onclick="showMessages()">Messages</button>
    <button onclick="changeUsername()">Modifier Username</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- AUTH -->
  <section id="auth" class="card">
    <h2>Welcome to TDA NETWORK</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="file" id="profilePic">
    <div>
      <button class="primary" onclick="register()">Register</button>
      <button class="secondary" onclick="login()">Login</button>
    </div>
  </section>

  <!-- HOME PAGE -->
  <section id="homePage" style="display:none;">
    <div class="stories card">
      <h3>Stories</h3>
      <div class="story-container" id="storiesList">
        <div class="story-card" onclick="addStory()">+ Add Story</div>
      </div>
    </div>

    <div class="card create-post">
      <textarea id="postText" placeholder="What's on your mind?"></textarea>
      <input type="file" id="postImage">
      <button class="primary" onclick="createPost()">Post</button>
    </div>

    <div id="posts" class="feed"></div>
  </section>

  <!-- MESSAGES -->
  <section id="messagesPage" style="display:none;">
    <div class="card">
      <h3>Messages privés</h3>
      <div id="messagesList"><p>Pas encore de messages...</p></div>
    </div>
  </section>

</div>

<!-- FIREBASE + APP JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// ======= CONFIG FIREBASE =======
const firebaseConfig = {
  apiKey: "VOTRE_API_KEY",
  authDomain: "VOTRE_DOMAIN",
  projectId: "VOTRE_PROJECT_ID",
  storageBucket: "VOTRE_BUCKET",
  messagingSenderId: "VOTRE_ID",
  appId: "VOTRE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// ======= VARIABLES =======
let currentUser = null;
let currentUsername = "";
let currentName = "";
let currentProfilePic = "";

// ======= AUTH FUNCTIONS =======
async function register(){
  const username = document.getElementById("username").value;
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const profileFile = document.getElementById("profilePic").files[0];

  if(!username||!name||!email||!password) return alert("Remplis tous les champs");

  let profileUrl = "";
  if(profileFile){
    const profileRef = ref(storage,"profiles/"+Date.now()+"_"+profileFile.name);
    const snap = await uploadBytes(profileRef, profileFile);
    profileUrl = await getDownloadURL(snap.ref);
  }

  try {
    const userCred = await createUserWithEmailAndPassword(auth,email,password);
    const user = userCred.user;
    await addDoc(collection(db,"users"),{
      uid:user.uid,
      username,
      name,
      email,
      profilePic:profileUrl,
      usernameLastChange:Date.now()
    });
    alert("Compte créé 🔥");
  } catch(err){ alert(err.message); }
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try{
    await signInWithEmailAndPassword(auth,email,password);
    alert("Bienvenue 🔥");
  }catch(err){ alert(err.message); }
}

function logout(){ signOut(auth); }

// ======= AUTO SESSION =======
onAuthStateChanged(auth, async(user)=>{
  if(user){
    currentUser = user;
    document.getElementById("auth").style.display="none";
    document.getElementById("homePage").style.display="block";
    document.getElementById("navbar").style.display="flex";

    const usersSnap = await getDocs(collection(db,"users"));
    usersSnap.forEach(docSnap=>{
      const data = docSnap.data();
      if(data.uid===user.uid){
        currentUsername = data.username;
        currentName = data.name;
        currentProfilePic = data.profilePic;
      }
    });

    loadPostsRealtime();
  } else {
    currentUser = null;
    document.getElementById("auth").style.display="block";
    document.getElementById("homePage").style.display="none";
    document.getElementById("navbar").style.display="none";
  }
});

// ======= CREATE POST =======
async function createPost(){
  const text = document.getElementById("postText").value;
  const file = document.getElementById("postImage").files[0];
  let fileUrl = "";
  let fileType = "";

  if(file){
    const fileRef = ref(storage,"uploads/"+Date.now()+"_"+file.name);
    const snap = await uploadBytes(fileRef,file);
    fileUrl = await getDownloadURL(snap.ref);
    fileType = file.type.startsWith("image")?"image":"video";
  }

  try{
    await addDoc(collection(db,"posts"),{
      text,
      fileUrl,
      fileType,
      createdAt: new Date(),
      username:currentUsername,
      name:currentName,
      profilePic:currentProfilePic,
      likes:[],
      comments:[]
    });
    document.getElementById("postText").value="";
    document.getElementById("postImage").value="";
  }catch(err){ alert(err.message); }
}

// ======= LOAD POSTS =======
function loadPostsRealtime(){
  const q = query(collection(db,"posts"),orderBy("createdAt","desc"));
  const postsDiv = document.getElementById("posts");
  onSnapshot(q,(snapshot)=>{
    postsDiv.innerHTML="";
    snapshot.forEach(docSnap=>{
      const data = docSnap.data();
      const postId = docSnap.id;

      let mediaHTML="";
      if(data.fileUrl){
        if(data.fileType==="image") mediaHTML=`<img src="${data.fileUrl}" style="width:100%;border-radius:8px;cursor:pointer;" onclick="openMedia('${data.fileUrl}','image')">`;
        else if(data.fileType==="video") mediaHTML=`<video controls style="width:100%;border-radius:8px;" onclick="openMedia('${data.fileUrl}','video')"><source src="${data.fileUrl}" type="video/mp4"></video>`;
      }

      postsDiv.innerHTML += `
        <div class="post card" id="${postId}">
          <p><img src="${data.profilePic||''}" class="profile-pic"><strong>${data.name}</strong> (@${data.username})</p>
          <p>${data.text}</p>
          ${mediaHTML}
          <div class="post-actions">
            <button onclick="likePost('${postId}')">❤️ ${data.likes.length}</button>
            <button onclick="showCommentBox('${postId}')">💬 ${data.comments.length}</button>
            <button onclick="sharePost('${postId}')">🔗 Share</button>
            ${data.fileUrl?`<button onclick="downloadFile('${data.fileUrl}')">⬇️ Télécharger</button>`:""}
          </div>
          <div id="commentBox-${postId}" style="display:none; margin-top:5px;">
            <input type="text" id="commentInput-${postId}" placeholder="Commenter">
            <button onclick="addComment('${postId}')">Send</button>
          </div>
          <div id="commentsList-${postId}">
            ${data.comments.map(c=>`<p><img src="${c.profilePic||''}" class="profile-pic"><strong>${c.name}</strong> (@${c.username}): ${c.text}</p>`).join('')}
          </div>
        </div>
      `;
    });
  });
}

// ======= POST INTERACTIONS =======
async function likePost(postId){
  const postRef = doc(db,"posts",postId);
  await updateDoc(postRef,{likes:arrayUnion(currentUsername)});
}
function showCommentBox(postId){
  const box = document.getElementById(`commentBox-${postId}`);
  box.style.display = box.style.display==="none"?"block":"none";
}
async function addComment(postId){
  const input = document.getElementById(`commentInput-${postId}`);
  const commentText = input.value;
  if(!commentText) return;
  const postRef = doc(db,"posts",postId);
  await updateDoc(postRef,{comments:arrayUnion({
    username:currentUsername,
    name:currentName,
    profilePic:currentProfilePic,
    text:commentText
  })});
  input.value="";
}
function sharePost(postId){
  navigator.clipboard.writeText(window.location.href+"#"+postId);
  alert("Lien du post copié 🔥");
}
function downloadFile(url){ const a=document.createElement("a"); a.href=url; a.download=url.split("/").pop(); a.click(); }

// ======= STORIES =======
function addStory(){
  const storyCard=document.createElement("div");
  storyCard.classList.add("story-card");
  storyCard.innerText="Nouvelle Story";
  document.getElementById("storiesList").appendChild(storyCard);
}

// ======= MODAL MEDIA =======
function openMedia(url,type){
  const modal=document.createElement("div");
  modal.style.position="fixed"; modal.style.top=0; modal.style.left=0;
  modal.style.width="100%"; modal.style.height="100%";
  modal.style.background="rgba(0,0,0,0.9)";
  modal.style.display="flex"; modal.style.justifyContent="center"; modal.style.alignItems="center";
  modal.style.zIndex="9999"; modal.style.cursor="pointer";
  modal.onclick=()=>document.body.removeChild(modal);
  if(type==="image"){ const img=document.createElement("img"); img.src=url; img.style.maxWidth="90%"; img.style.maxHeight="90%"; modal.appendChild(img);}
  else if(type==="video"){ const video=document.createElement("video"); video.src=url; video.controls=true; video.autoplay=true; video.style.maxWidth="90%"; video.style.maxHeight="90%"; modal.appendChild(video);}
  document.body.appendChild(modal);
}

// ======= CHANGE USERNAME 72H =======
async function changeUsername(){
  const newUsername = prompt("Nouveau username:");
  if(!newUsername) return;
  const users = await getDocs(collection(db,"users"));
  users.forEach(async(docSnap)=>{
    const data = docSnap.data();
    if(data.uid===currentUser.uid){
      const hoursPassed = (Date.now()-data.usernameLastChange)/(1000*60*60);
      if(hoursPassed<72){ return alert("Vous pouvez changer votre username dans "+Math.ceil(72-hoursPassed)+" heures"); }
      const userRef = doc(db,"users",docSnap.id);
      await updateDoc(userRef,{username:newUsername, usernameLastChange:Date.now()});
      currentUsername = newUsername;
      alert("Username modifié 🔥");
      location.reload();
    }
  });
}

// ======= NAVIGATION =======
function showHome(){ document.getElementById("homePage").style.display="block"; document.getElementById("messagesPage").style.display="none"; }
function showMessages(){ document.getElementById("homePage").style.display="none"; document.getElementById("messagesPage").style.display="block"; }
window.register=register; window.login=login; window.logout=logout;
</script>

</body>
        </html>
