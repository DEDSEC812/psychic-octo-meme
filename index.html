<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact & Citation</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e1e2f, #3a3a5c);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: #ffd700;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .quote {
      font-style: italic;
      font-size: 1.2rem;
      margin: 20px 0;
      padding: 15px;
      border-left: 4px solid #ffd700;
      background: rgba(255, 215, 0, 0.1);
      max-width: 700px;
      border-radius: 8px;
    }

    img {
      max-width: 300px;
      width: 80%;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    img:hover {
      transform: scale(1.05);
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #fff;
    }

    .btn-email {
      background: #ff6b6b;
    }

    .btn-email:hover {
      background: #ff4c4c;
      transform: translateY(-3px);
    }

    .btn-whatsapp {
      background: #25d366;
    }

    .btn-whatsapp:hover {
      background: #1ebe57;
      transform: translateY(-3px);
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <h1>Contactez-moi</h1>
  <p>Si tu as quelque chose à me dire, écris-moi par e-mail ou WhatsApp.</p>

  <img src="https://files.catbox.moe/tkmjyf.jpeg" alt="Image Moderne">

  <div class="buttons">
    <a href="mailto:siriuscoderrr@gmail.com" class="btn btn-email">
      📧 E-mail
    </a>
    <a href="https://wa.me/50939103464" class="btn btn-whatsapp">
      💬 WhatsApp
    </a>
  </div>

  <div class="quote">
    "La lumière de la vérité guide celui qui persévère sur le chemin de la sagesse." – Franc-maçon
  </div>

</body>
      </html>
